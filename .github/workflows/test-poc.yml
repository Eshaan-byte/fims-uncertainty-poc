name: Test POC
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install TMB
        run: Rscript -e 'install.packages("TMB", repos="https://cloud.r-project.org")'
      - name: Run POC
        run: Rscript run_poc.R
